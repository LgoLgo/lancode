<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 700" width="960" height="700">
  <defs>
    <filter id="sh" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000014"/>
    </filter>
  </defs>

  <rect width="960" height="700" fill="#f7f3ec"/>

  <!-- 入口层 -->
  <rect x="32" y="24" width="896" height="108" rx="10" fill="#fff8ee" stroke="#e8d5b0" stroke-width="1.5" filter="url(#sh)"/>
  <text x="52" y="46" font-size="11" font-weight="600" fill="#b8860b" font-family="system-ui,-apple-system,sans-serif">入口层</text>
  <rect x="340" y="56" width="280" height="62" rx="8" fill="#fff" stroke="#e0c87a" stroke-width="1.5" filter="url(#sh)"/>
  <text x="480" y="80" text-anchor="middle" font-size="14" font-weight="700" fill="#5a4a00" font-family="system-ui,-apple-system,sans-serif">Main</text>
  <text x="480" y="97" text-anchor="middle" font-size="11" fill="#888" font-family="system-ui,-apple-system,sans-serif">CLI 入口 · REPL 循环 · 参数解析</text>
  <text x="480" y="111" text-anchor="middle" font-size="10" fill="#aaa" font-family="system-ui,-apple-system,sans-serif">Main.java</text>

  <!-- 核心循环层 -->
  <rect x="32" y="152" width="896" height="108" rx="10" fill="#eef4ff" stroke="#b0c8e8" stroke-width="1.5" filter="url(#sh)"/>
  <text x="52" y="174" font-size="11" font-weight="600" fill="#2a5fa0" font-family="system-ui,-apple-system,sans-serif">核心循环层</text>
  <rect x="300" y="184" width="360" height="62" rx="8" fill="#fff" stroke="#7aade0" stroke-width="2" filter="url(#sh)"/>
  <text x="480" y="208" text-anchor="middle" font-size="14" font-weight="700" fill="#1a4a80" font-family="system-ui,-apple-system,sans-serif">AgentLoop</text>
  <text x="480" y="225" text-anchor="middle" font-size="11" fill="#666" font-family="system-ui,-apple-system,sans-serif">callApi · executeToolCalls · 循环控制</text>
  <text x="480" y="239" text-anchor="middle" font-size="10" fill="#aaa" font-family="system-ui,-apple-system,sans-serif">AgentLoop.java · 达到 maxTurns 或无 tool_use 时退出</text>

