  <text x="115" y="547" text-anchor="middle" font-size="9" fill="#888" font-family="system-ui,-apple-system,sans-serif">Shell 执行</text>
  <rect x="196" y="514" width="130" height="36" rx="7" fill="#fff" stroke="#90c890" stroke-width="1" filter="url(#sh)"/>
  <text x="261" y="534" text-anchor="middle" font-size="11" font-weight="600" fill="#1a5a1a" font-family="system-ui,-apple-system,sans-serif">FileReadTool</text>
  <text x="261" y="547" text-anchor="middle" font-size="9" fill="#888" font-family="system-ui,-apple-system,sans-serif">文件读取</text>
  <rect x="342" y="514" width="130" height="36" rx="7" fill="#fff" stroke="#90c890" stroke-width="1" filter="url(#sh)"/>
  <text x="407" y="534" text-anchor="middle" font-size="11" font-weight="600" fill="#1a5a1a" font-family="system-ui,-apple-system,sans-serif">FileWriteTool</text>
  <text x="407" y="547" text-anchor="middle" font-size="9" fill="#888" font-family="system-ui,-apple-system,sans-serif">文件写入</text>
  <rect x="488" y="514" width="130" height="36" rx="7" fill="#fff" stroke="#90c890" stroke-width="1" filter="url(#sh)"/>
  <text x="553" y="534" text-anchor="middle" font-size="11" font-weight="600" fill="#1a5a1a" font-family="system-ui,-apple-system,sans-serif">FileEditTool</text>
  <text x="553" y="547" text-anchor="middle" font-size="9" fill="#888" font-family="system-ui,-apple-system,sans-serif">StrReplace</text>
  <rect x="634" y="514" width="130" height="36" rx="7" fill="#fff" stroke="#90c890" stroke-width="1" filter="url(#sh)"/>
  <text x="699" y="534" text-anchor="middle" font-size="11" font-weight="600" fill="#1a5a1a" font-family="system-ui,-apple-system,sans-serif">GlobTool</text>
  <text x="699" y="547" text-anchor="middle" font-size="9" fill="#888" font-family="system-ui,-apple-system,sans-serif">路径匹配</text>
  <rect x="780" y="514" width="130" height="36" rx="7" fill="#fff" stroke="#90c890" stroke-width="1" filter="url(#sh)"/>
  <text x="845" y="534" text-anchor="middle" font-size="11" font-weight="600" fill="#1a5a1a" font-family="system-ui,-apple-system,sans-serif">GrepTool</text>
  <text x="845" y="547" text-anchor="middle" font-size="9" fill="#888" font-family="system-ui,-apple-system,sans-serif">正则搜索</text>

  <!-- 外部系统层 -->
  <rect x="32" y="584" width="896" height="100" rx="10" fill="#fdf0f8" stroke="#d8a8c8" stroke-width="1.5" filter="url(#sh)"/>
  <text x="52" y="606" font-size="11" font-weight="600" fill="#7a2a6a" font-family="system-ui,-apple-system,sans-serif">外部系统层</text>
  <rect x="50" y="616" width="158" height="52" rx="7" fill="#fff" stroke="#c890b8" stroke-width="1" filter="url(#sh)"/>
  <text x="129" y="638" text-anchor="middle" font-size="11" font-weight="600" fill="#5a1a4a" font-family="system-ui,-apple-system,sans-serif">settings.json</text>
  <text x="129" y="654" text-anchor="middle" font-size="9" fill="#888" font-family="system-ui,-apple-system,sans-serif">~/.lancode/</text>
  <rect x="224" y="616" width="158" height="52" rx="7" fill="#fff" stroke="#c890b8" stroke-width="1" filter="url(#sh)"/>
  <text x="303" y="638" text-anchor="middle" font-size="11" font-weight="600" fill="#5a1a4a" font-family="system-ui,-apple-system,sans-serif">AGENT.md</text>
  <text x="303" y="654" text-anchor="middle" font-size="9" fill="#888" font-family="system-ui,-apple-system,sans-serif">项目上下文文档</text>
  <rect x="398" y="616" width="164" height="52" rx="7" fill="#fff" stroke="#c890b8" stroke-width="1" filter="url(#sh)"/>
  <text x="480" y="638" text-anchor="middle" font-size="11" font-weight="600" fill="#5a1a4a" font-family="system-ui,-apple-system,sans-serif">Anthropic API</text>
  <text x="480" y="654" text-anchor="middle" font-size="9" fill="#888" font-family="system-ui,-apple-system,sans-serif">/ 兼容 API</text>
  <rect x="578" y="616" width="164" height="52" rx="7" fill="#fff" stroke="#c890b8" stroke-width="1" filter="url(#sh)"/>
  <text x="660" y="638" text-anchor="middle" font-size="11" font-weight="600" fill="#5a1a4a" font-family="system-ui,-apple-system,sans-serif">本地文件系统</text>
  <text x="660" y="654" text-anchor="middle" font-size="9" fill="#888" font-family="system-ui,-apple-system,sans-serif">读 / 写 / 搜索</text>
  <rect x="758" y="616" width="158" height="52" rx="7" fill="#fff" stroke="#c890b8" stroke-width="1" filter="url(#sh)"/>
  <text x="837" y="638" text-anchor="middle" font-size="11" font-weight="600" fill="#5a1a4a" font-family="system-ui,-apple-system,sans-serif">Shell</text>
  <text x="837" y="654" text-anchor="middle" font-size="9" fill="#888" font-family="system-ui,-apple-system,sans-serif">命令执行环境</text>
</svg>
