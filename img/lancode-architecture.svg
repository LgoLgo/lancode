  <rect x="50" y="312" width="198" height="70" rx="8" fill="#fff" stroke="#c8b888" stroke-width="1.5" filter="url(#sh)"/>
  <text x="149" y="334" text-anchor="middle" font-size="12" font-weight="700" fill="#3a2c18" font-family="system-ui,-apple-system,sans-serif">ConversationContext</text>
  <text x="149" y="351" text-anchor="middle" font-size="10" fill="#888" font-family="system-ui,-apple-system,sans-serif">消息列表 / 上下文截断</text>
  <text x="149" y="366" text-anchor="middle" font-size="10" fill="#aaa" font-family="system-ui,-apple-system,sans-serif">addUserMessage · addToolResults</text>
